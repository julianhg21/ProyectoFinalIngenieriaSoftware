name: CI CD

on:
  push:
    branches:
      - main
      - develop
      - qa
      - release/**
      - feature/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - develop
      - qa
      - release/**

permissions:
  contents: read

jobs:
  backend:
    name: Backend .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore backend dependencies
        run: dotnet restore backend/src/ArtesanosMarket.Api/ArtesanosMarket.Api.csproj

      - name: Build backend
        run: dotnet build backend/src/ArtesanosMarket.Api/ArtesanosMarket.Api.csproj --configuration Release --no-restore

      - name: Static analysis backend
        run: dotnet format backend/src/ArtesanosMarket.Api/ArtesanosMarket.Api.csproj --verify-no-changes --verbosity minimal

      - name: Run backend tests with coverage
        shell: bash
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          DOTNET_ENVIRONMENT: Testing
          USE_INMEMORY_DATABASE: 'true'
        run: |
          TEST_PROJECTS=$(find backend -name "*Tests.csproj" -o -name "*Test.csproj" | tr '\n' ' ')
          if [ -z "$TEST_PROJECTS" ]; then
            echo "No backend test projects found."
            exit 1
          fi
          mkdir -p TestResults/Coverage
          for project in $TEST_PROJECTS; do
            dotnet test "$project" --configuration Release --logger "trx" /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput="../../../TestResults/Coverage/coverage" /p:Threshold=60 /p:ThresholdType=line /p:ThresholdStat=total
          done

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: TestResults/Coverage
          if-no-files-found: error

  frontend:
    name: Frontend React
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  deployment:
    name: Deployment trigger evidence
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Confirm external CD
        run: |
          echo "CI finished on main."
          echo "Render and Vercel handle automatic deployment from GitHub."
