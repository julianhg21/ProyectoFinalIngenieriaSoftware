trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Backend
    displayName: Backend .NET
    jobs:
      - job: BuildBackend
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: sdk
              version: 8.0.x
          - script: dotnet restore backend/src/ArtesanosMarket.Api/ArtesanosMarket.Api.csproj
            displayName: Restore backend
          - script: dotnet build backend/src/ArtesanosMarket.Api/ArtesanosMarket.Api.csproj --configuration Release --no-restore
            displayName: Build backend
          - script: dotnet test backend/tests/ArtesanosMarket.Tests/ArtesanosMarket.Tests.csproj --configuration Release
            displayName: Test backend

  - stage: Frontend
    displayName: Frontend React
    jobs:
      - job: BuildFrontend
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: 20.x
          - script: npm install
            workingDirectory: frontend
            displayName: Install dependencies
          - script: npm run build
            workingDirectory: frontend
            displayName: Build frontend
